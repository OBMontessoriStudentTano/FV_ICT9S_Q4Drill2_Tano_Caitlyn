<!DOCTYPE html>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<body>
        <h1>Heat Index Checker</h1>

    <input type="text" id="HeatIndex" class="form-control" placeholder="type here"> 
    <button class="btn btn-info" onclick = "checkHI()">Check</button>

    <script>
        function checkHI(){
        var temp = document.getElementById("HeatIndex").value;    
        var humid; // same as temp
        var HeatIndex; // formula

        var status = "";

        switch (true){
             case (HeatIndex <= 27): //compare
             status = "Comfortable / Cool";
             break;
             case (28 <= HeatIndex >= 32): //compare
             status = "Warm";
             break;
             case (33 <= HeatIndex >= 37): //compare
             status = "Hot";
             break;
             case (38 <= HeatIndex >= 41): //compare
             status = "Very Hot / Caution";
             break;
             case (HeatIndex >= 42): //compare
             status = "Extreme Heat / Danger";
             break;
             
          default:
            status = "";   
        }

        alert("Heat Index:" + HeatIndex.toFixed(1) + "\n" + "Status" + status); 
             
             
        }
    </script>
    
</body>
