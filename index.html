<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Drill 2</title>
</head>
<body>
        <h1>Heat Index Checker</h1>
    
    <form onsumbmit="checkHI(); return false;">
    <input type="text" id="HeatIndex" class="form-control" placeholder="type here"> 
    <button class="btn btn-info" onclick = "checkHI()">Check</button>
    </form>

    <script>
        function checkHI(){
        var temp = document.getElementById("HeatIndex").value;
        var HeatIndex = parseFloat(temp);    
        

        var status = "";

        switch (true){
             case (HeatIndex <= 27):
             status = "Comfortable / Cool";
             break;
             case (HeatIndex >= 28 && HeatIndex <= 32):
             status = "Warm";
             break;
             case (HeatIndex >= 33 && HeatIndex <= 37):
             status = "Hot";
             break;
             case (HeatIndex >= 38 && HeatIndex <= 41):
             status = "Very Hot / Caution";
             break;
             case (HeatIndex >= 42):
             status = "Extreme Heat / Danger";
             break;
          default:
            status = "";   
        }

        alert( "Heat Index:" =  + HeatIndex.toFixed(1) + "\nStatus:" + status); 
             
             
        }
    </script>
    
</body>
</html>
