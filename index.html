<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<body>
        <h1>Heat Index Checker</h1>

    <input type="text" id="HeatIndex" class="form-control" placeholder="type here"> 
    <button class="btn btn-info" onclick = "Heat()">Check</button>

    <script>
        function Heat(){
        var temp = document.getElementById("HeatIndex").value;    
        var humid; // same as temp
        var HeatIndex.toFixed(0); // formula

        var status = "";

        switch (true){
             case (HeatIndex <= 27): //compare
             status = "Comfortable / Cool";
             break;
             case (HeatIndex >= 28 && HeatIndex <= 32): //compare
             status = "Warm";
             break;
             case (HeatIndex >= 33 && HeatIndex <= 37): //compare
             status = "Hot";
             break;
             case (HeatIndex >= 38 && HeatIndex <= 41): //compare
             status = "Very Hot / Caution";
             break;
             case (HeatIndex >= 42): //compare
             status = "Extreme Heat / Danger";
             break;
             
          default:
            status = "";   
        }

        alert("Heat Index:" + HeatIndex.toFixed(1) + "\n" + "Status" + status); 
             
             
        }
    </script>
    

</body>
</html>
